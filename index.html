<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Project | iyaw.projecto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <!-- Simple Header -->
    <nav class="sticky top-0 w-full bg-white/80 backdrop-blur-md z-50 border-b border-slate-100">
        <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-slate-600 hover:text-blue-600 transition font-medium group">
                <svg class="w-5 h-5 group-hover:-translate-x-1 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                Kembali
            </a>
            <span class="text-sm font-bold tracking-tight">iyaw.projecto<span class="text-blue-600">.</span></span>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="" class="max-w-4xl mx-auto px-6 py-12 fade-in">
        <!-- Data akan diisi oleh JavaScript -->
        <div class="animate-pulse space-y-8">
            <div class="h-8 bg-slate-100 rounded w-1/4"></div>
            <div class="h-12 bg-slate-100 rounded w-3/4"></div>
            <div class="h-64 bg-slate-100 rounded-3xl w-full"></div>
        </div>
    </main>

    <script>
        // Database Project Sederhana
        const projectData = {
            'network': {
                category: 'Networking',
                title: 'Hotspot Management System',
                description: 'Detail pengerjaan sistem manajemen jaringan hotspot menggunakan MikroTik untuk optimasi akses internet publik yang aman dan stabil.',
                summary: 'Project ini berawal dari kebutuhan sebuah kafe yang ingin membatasi durasi pemakaian internet pelanggan tanpa harus mengganti password Wi-Fi secara manual setiap hari. Saya mengimplementasikan sistem RADIUS dan User Manager pada MikroTik.',
                tasks: [
                    'Konfigurasi Firewall dan NAT untuk keamanan jaringan internal.',
                    'Pembuatan Landing Page Hotspot kustom yang responsif.',
                    'Limitasi Bandwidth (Queue) per user agar koneksi adil.'
                ],
                techs: ['MikroTik OS', 'Winbox', 'HTML/CSS'],
                date: '2 Minggu (Januari 2024)',
                imageLabel: ''
            },
            'streaming': {
                category: 'Creative Multimedia',
                title: 'Interactive Streaming Setup',
                description: 'Konfigurasi PC Dual-Stream dengan sistem audio routing kustom untuk pengalaman streaming tanpa lag.',
                summary: 'Project ini fokus pada pembuatan sistem streaming yang profesional untuk content creator. Menggunakan dua PC (Gaming & Streaming) agar performa game tetap maksimal sambil melakukan encoding video kualitas tinggi.',
                tasks: [
                    'Setup NDI/Capture Card untuk transfer video antar PC.',
                    'Konfigurasi Audio Mixer Digital untuk memisahkan suara game dan musik.',
                    'Pembuatan overlay interaktif menggunakan StreamElements.'
                ],
                techs: ['OBS Studio', 'NDI Tech', 'Voicemeeter'],
                date: '1 Minggu (Februari 2024)',
                imageLabel: ''
            }
        };

        // Fungsi untuk merender konten berdasarkan ID di URL
        function renderProject() {
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('id') || 'network'; // Default ke 'network' jika tidak ada ID
            const project = projectData[projectId];

            if (!project) {
                document.getElementById('project-container').innerHTML = `<h1 class="text-2xl font-bold">Project tidak ditemukan.</h1>`;
                return;
            }

            const container = document.getElementById('project-container');
            container.innerHTML = `
                <header class="mb-12">
                    <span class="text-blue-600 font-bold text-sm uppercase tracking-widest">${project.category}</span>
                    <h1 class="text-4xl md:text-5xl font-extrabold mt-3 mb-6 tracking-tight">${project.title}</h1>
                    <p class="text-lg text-slate-600 leading-relaxed">${project.description}</p>
                </header>

                <div class="w-full h-64 md:h-96 bg-slate-50 rounded-[2.5rem] mb-12 flex items-center justify-center border border-slate-100 overflow-hidden shadow-inner">
                    <div class="text-slate-400 flex flex-col items-center p-6 text-center">
                        <svg class="w-16 h-16 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        <p class="font-medium text-sm italic">${project.imageLabel}</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-12 mb-16">
                    <div class="md:col-span-2 space-y-8">
                        <section>
                            <h2 class="text-2xl font-bold mb-4">Ringkasan Project</h2>
                            <p class="text-slate-600 leading-relaxed">${project.summary}</p>
                        </section>

                        <section>
                            <h2 class="text-2xl font-bold mb-4">Apa yang Saya Kerjakan?</h2>
                            <ul class="space-y-4">
                                ${project.tasks.map(task => `
                                    <li class="flex gap-3">
                                        <svg class="w-6 h-6 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                                        <span class="text-slate-600">${task}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </section>
                    </div>

                    <aside class="space-y-8 bg-slate-50 p-8 rounded-[2rem] border border-slate-100">
                        <div>
                            <h3 class="font-bold text-xs uppercase text-slate-400 tracking-widest mb-4">Teknologi</h3>
                            <div class="flex flex-wrap gap-2">
                                ${project.techs.map(t => `<span class="px-3 py-1 bg-white text-slate-700 text-[11px] font-bold rounded-full border border-slate-200 shadow-sm">${t}</span>`).join('')}
                            </div>
                        </div>
                        <div>
                            <h3 class="font-bold text-xs uppercase text-slate-400 tracking-widest mb-2">Waktu Pengerjaan</h3>
                            <p class="text-slate-600 text-sm italic">${project.date}</p>
                        </div>
                        <div>
                            <h3 class="font-bold text-xs uppercase text-slate-400 tracking-widest mb-3">Link Project</h3>
                            <a href="#" class="text-blue-600 font-bold text-sm hover:underline flex items-center gap-1">
                                Lihat Live Demo
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                            </a>
                        </div>
                    </aside>
                </div>

                <footer class="border-t border-slate-100 pt-12 text-center">
                    <h3 class="text-xl font-bold mb-4">Punya ide gila lainnya?</h3>
                    <a href="index.html#contact" class="inline-block bg-slate-900 text-white px-8 py-4 rounded-2xl font-bold hover:bg-slate-800 transition shadow-xl shadow-slate-100">
                        Ayo Kerjakan Bareng!
                    </a>
                </footer>
            `;
        }

        // Jalankan render saat halaman dimuat
        window.onload = renderProject;
    </script>

</body>
</html>
